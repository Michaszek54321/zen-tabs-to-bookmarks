<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Zen Autosave – Settings</title>
    <style>
        body { font-family: sans-serif; padding: 24px; }
        label { display:block; margin: 16px 0; }
        input { font-size: 16px; padding: 4px; }
    </style>
    </head>
    <body>
    <h2>Autosave Settings</h2>

    <label>
        Device / Computer name (folder name in bookmarks):
        <input type="text" id="deviceName" />
    </label>

    <label>
        Autosave delay (seconds):
        <input type="number" id="delay" min="3" />
    </label>

    <label>
        Essential tabs to ignore (first pinned tabs):
        <input type="number" id="essentials" min="0" />
    </label>

    <button id="save">Save</button>

    <script src="options.js"></script>
</body>
</html>
